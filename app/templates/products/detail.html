{% extends "base.html" %}

{% block title %}
Product Detail
{% endblock %}

{% block content %}

<div class="row">

<div class="col-md-5">

<img
src="{{ product.image }}"
class="img-fluid"
alt="{{ product.title }}">

</div>

<div class="col-md-7">

<h2>

{{ product.title }}

</h2>

<p>

<strong>Category :</strong>

{{ product.category }}

</p>

<h3>

${{ product.price }}

</h3>

<p>

<strong>Rating :</strong>

{{ product.rating.rate }}

({{ product.rating.count }} reviews)

</p>

<p>

{{ product.description }}

</p>

<a
href="{{ url_for('products.index') }}"
class="btn btn-secondary">

← Kembali

</a>

</div>

</div>

{% endblock %}
